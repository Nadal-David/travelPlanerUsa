<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0b1730" />
    <title>Travel Planner USA</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="./assets/favicon.svg" />
    <link rel="mask-icon" href="./assets/favicon.svg" color="#38bdf8" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="./assets/styles.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" defer></script>
    <script src="./assets/data.js" defer></script>
    <script src="./assets/app.js" defer></script>
  </head>
  <body class="bg-slate-950 font-sans text-slate-100 antialiased">
    <main class="mx-auto min-h-screen max-w-4xl px-4 py-4 sm:px-5 lg:px-0">
      <header class="rounded-xl border border-slate-700 bg-slate-900 p-4 shadow-lg shadow-slate-950/25 sm:p-5">
        <div class="flex flex-col gap-4">
          <div class="flex items-start justify-between gap-4">
            <div>
              <p class="text-xs font-bold uppercase tracking-[0.24em] text-sky-300">Voyage USA</p>
              <h1 class="mt-2 text-2xl font-black tracking-tight text-white sm:text-4xl">
                20/09/2026 au 08/10/2026
              </h1>
            </div>
          </div>
        </div>
      </header>

      <nav class="mt-4 rounded-xl border border-slate-700 bg-slate-900 p-2">
        <div id="nav-tabs" class="flex gap-2 overflow-x-auto"></div>
        <div id="day-picker-wrap" class="mt-2 border-t border-slate-800 pt-2">
          <label class="block text-[11px] font-bold uppercase tracking-[0.24em] text-slate-500" for="day-select">
            Choisir un jour
          </label>
          <div class="relative mt-2">
            <button
              id="day-picker-button"
              class="flex w-full items-center justify-between rounded-2xl border border-slate-700/80 bg-gradient-to-r from-slate-950 to-slate-900 px-4 py-3 text-left text-slate-100 shadow-inner shadow-slate-950/40 ring-1 ring-transparent transition hover:border-sky-400/40 focus:border-sky-400/60 focus:outline-none focus:ring-2 focus:ring-sky-400/20"
              type="button"
              aria-haspopup="listbox"
              aria-expanded="false"
            >
              <span>
                <span class="block text-[10px] font-bold uppercase tracking-[0.24em] text-slate-500">Jour choisi</span>
                <span id="day-picker-label" class="mt-1 block text-sm font-semibold">Jour 1 - 20/09/2026</span>
              </span>
              <svg viewBox="0 0 20 20" fill="currentColor" aria-hidden="true" class="ml-4 h-5 w-5 text-slate-400">
                <path fill-rule="evenodd" d="M5.23 7.21a.75.75 0 0 1 1.06.02L10 10.94l3.71-3.71a.75.75 0 1 1 1.06 1.06l-4.24 4.24a.75.75 0 0 1-1.06 0L5.21 8.27a.75.75 0 0 1 .02-1.06Z" clip-rule="evenodd" />
              </svg>
            </button>
            <div
              id="day-picker-menu"
              class="absolute left-0 right-0 top-full z-20 mt-2 hidden max-h-80 overflow-y-auto rounded-2xl border border-slate-700/80 bg-slate-950 shadow-2xl shadow-slate-950/50"
              role="listbox"
            ></div>
          </div>
        </div>
      </nav>

      <section id="app-view" class="mt-4">
        <section id="days" class="grid gap-3"></section>
      </section>

      <section id="esta-view" class="mt-4 hidden"></section>
      <section id="esim-view" class="mt-4 hidden">
        <div id="esim-container" class="grid gap-3"></div>
      </section>
      <section id="parks-view" class="mt-4 hidden">
        <div id="parks-container" class="grid gap-3"></div>
      </section>
      <section id="todo-view" class="mt-4 hidden grid gap-3">
        <div id="traveler-container"></div>
        <div id="prep-container"></div>
        <div id="david-container"></div>
        <div id="emeline-container"></div>
        <div id="both-container"></div>
      </section>
    </main>
  </body>
</html>
